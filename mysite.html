<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img {
            width: 100px;
        }

        header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid rgb(237, 199, 45);
            padding-bottom: 10px;
        }

        nav {
            display: flex;
            text-align: center;
            align-items: center;
            padding-right: 5px;

        }

        ul {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            list-style-type: none;
            color: gray;
            font-size: 19px;
            /* width: 50%; */
        }

        .hireme {
            padding: 10px;
            margin-left: 40px;
            width: 100px;
            background-color: rgb(237, 199, 45);
            color: white;
            border: 0;
            border-radius: 5px;
        }

        .cv {
            width: 120px;
            padding: 15px;
            background-color: rgb(237, 199, 45);
            color: white;
            border: 0;
            border-radius: 5px;
        }

        .profile {
            width: 500px;
        }

        section {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            text-align: right;
        }

        h3 {
            color: rgb(237, 199, 45);
        }
    </style>
</head>

<body>
    <!-- header  -->
    <header>
        <img src="./assets/logo.png" alt="logo">

        <!-- navbar  -->
        <nav>
            <ul>
                <li>Home</li>
                <li>About Me</li>
                <li>Case Study</li>

                <button class="hireme"> Hire me</button>

            </ul>
        </nav>

    </header>
    <!-- intro section  -->
    <section>
        <img class="profile" src="./assets/profile.jpg" alt="profile pic">

        <div class="intro">
            <h1> Hello , I am a Web Developer</h1>
            <h3>Web Developer</h3>
            <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Sit repellendus voluptate quisquam vel nisi
                illo? Voluptate dolor commodi tempora.</p>

            <button class="cv"> Download CV</button>


        </div>
    </section>
</body>

</html>
